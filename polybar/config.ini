[colors]
background = #191919
foreground = #ffffff
primary = #ff355b
alert = #CB6C94 
disabled = #76d4ff

red = #ff355b
blue = #76d4ff
yellow = #ffc251 

[bar/yumeka-bar]
width = 100%
height = 24pt
bottom = true
override-redirect = false
wm-restack = bspwm

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

module-margin = 1

separator = |
separator-foreground = ${colors.yellow}

font-0 = noto sans cjk jp:size=10;2
font-1 = noto sans symbols2:size=12;4

modules-left = bspwm xwindow
modules-right = player-mpris-tail pulseaudio battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right

scroll-up = bspc desktop -f prev.local
scroll-down = bspc desktop -f next.local

[module/bspwm]
type = internal/bspwm

ws-icon-0 = 1;一
ws-icon-1 = 2;ニ
ws-icon-2 = 3;三
ws-icon-3 = 4;四
ws-icon-4 = 5;五
ws-icon-5 = 6;六
ws-icon-6 = 7;七
ws-icon-7 = 8;八
ws-icon-8 = 9;九

label-active = %icon%
label-active-underline = ${colors.red}
label-active-padding = 1

label-occupied = %icon%
label-occupied-padding = 1

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %icon%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-maxlen = 50

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.red}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/date]
type = internal/date
interval = 1

date = %H時:%M分
date-alt = %Y年%m月%d日

label = %date%
label-foreground = ${colors.red}

[module/battery]
type = internal/battery
label-foreground = ${colors.red}
; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT1
adapter = ACAD

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

[module/player-mpris-tail]
type = custom/script
exec = ~/.config/polybar/scripts/player-mpris-tail.py -f '%{u#E23182}%{+u}{:w15:{title}:} | %{A1:~/.config/polybar/scripts/player-mpris-tail.py previous:} ⏮  %{A} %{A1:~/.config/polybar/scripts/player-mpris-tail.py play-pause:} {icon-reversed} %{A} %{A1:~/.config/polybar/scripts/player-mpris-tail.py next:} ⏭  %{A}'
tail = true

[settings]
screenchange-reload = true
pseudo-transparency = true
